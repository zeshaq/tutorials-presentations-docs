apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: main-ingress-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "api.dr.bank.example.com"
      tls:
        mode: SIMPLE
        credentialName: istio-ingressgateway-tls-dr
