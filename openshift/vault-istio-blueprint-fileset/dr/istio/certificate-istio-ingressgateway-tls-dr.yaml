apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: istio-ingressgateway-tls-dr
  namespace: istio-system
spec:
  secretName: istio-ingressgateway-tls-dr
  issuerRef:
    name: vault-pki-ingress-dr
    kind: ClusterIssuer
  commonName: api.dr.bank.example.com
  dnsNames:
    - api.dr.bank.example.com
    - apps.dr.bank.example.com
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
  duration: 720h
  renewBefore: 168h
