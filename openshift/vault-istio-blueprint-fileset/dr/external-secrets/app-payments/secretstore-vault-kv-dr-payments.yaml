apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-kv-dr-payments
  namespace: app-payments
spec:
  provider:
    vault:
      server: https://vault-dr.bank.example.com:8200
      path: kv-dr
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes-dr
          role: eso-kv-readonly-dr
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
