apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-pki-platform-internal
spec:
  vault:
    server: REPLACE_ME_VAULT_ADDR
    path: REPLACE_ME_VAULT_PKI_SIGN_PATH
    caBundle: REPLACE_ME_BASE64_CA_BUNDLE
    auth:
      kubernetes:
        mountPath: /v1/auth/REPLACE_ME_VAULT_K8S_AUTH_MOUNT
        role: cert-manager-pki-issuer
        serviceAccountRef:
          name: cert-manager
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-kv-platform
spec:
  provider:
    vault:
      server: REPLACE_ME_VAULT_ADDR
      path: REPLACE_ME_VAULT_KV_MOUNT
      version: v2
      caBundle: REPLACE_ME_BASE64_CA_BUNDLE
      auth:
        kubernetes:
          mountPath: REPLACE_ME_VAULT_K8S_AUTH_MOUNT
          role: eso-kv-readonly
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
